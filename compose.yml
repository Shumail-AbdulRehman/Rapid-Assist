services:
  mongodb:
    image: mongo:7
    container_name: roadside-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: roadside_app
    volumes:
      - roadside_mongo_data:/data/db

volumes:
  roadside_mongo_data:
    name: roadside_mongo_data
